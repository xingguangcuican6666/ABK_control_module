name: Lint

on:
  push:
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bash syntax
        run: bash -n setup.sh scripts/libabk.sh scripts/abk_control_setup.sh tests/abk_control_setup_test.sh lkm/build.sh tests/lkm_build_test.sh

      - name: ShellCheck
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck setup.sh scripts/libabk.sh scripts/abk_control_setup.sh tests/abk_control_setup_test.sh lkm/build.sh tests/lkm_build_test.sh
          else
            echo "shellcheck is not installed, skipped"
          fi

      - name: Setup test
        run: bash tests/abk_control_setup_test.sh

      - name: LKM test
        run: bash tests/lkm_build_test.sh
